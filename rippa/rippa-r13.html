<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Product | The IronCub Company</title>
<meta name="description" content="Productdetails — The IronCub Company">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/jpeg" href="/assets/logo-icon.jpg">
<link rel="stylesheet" href="/styles.css">
<style>
.pdp-container{max-width:1100px;margin:0 auto;padding:40px 20px}
.pdp-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-top:24px}
@media(max-width:768px){.pdp-grid{grid-template-columns:1fr;gap:24px}}
.pdp-gallery{position:relative}
.pdp-main-img{width:100%;border-radius:12px;overflow:hidden;background:#f5f5f5}
.pdp-main-img img{width:100%;height:auto;display:block}
.pdp-thumbs{display:flex;gap:8px;margin-top:12px;overflow-x:auto}
.pdp-thumb{width:72px;height:54px;border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.pdp-thumb.active{border-color:#E8831A}
.pdp-thumb img{width:100%;height:100%;object-fit:cover}
.pdp-info h1{font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;margin:0 0 4px}
.pdp-subtitle{color:#666;font-size:1rem;margin:0 0 20px}
.pdp-price{font-size:1.5rem;font-weight:700;color:#1a1a1a;margin:16px 0}
.pdp-price-old{text-decoration:line-through;color:#999;font-weight:400;font-size:1.1rem;margin-right:8px}
.pdp-btw{color:#888;font-size:.85rem;font-weight:400}
.pdp-specs{margin:24px 0}
.pdp-specs table{width:100%;border-collapse:collapse}
.pdp-specs td{padding:10px 0;border-bottom:1px solid #eee;font-size:.9rem}
.pdp-specs td:first-child{color:#888;width:40%}
.pdp-specs td:last-child{font-weight:500}
.pdp-desc{color:#555;font-size:.95rem;line-height:1.7;margin:20px 0}
.pdp-actions{display:flex;gap:12px;flex-wrap:wrap;margin:24px 0}
.pdp-tags{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.pdp-tag{background:#f5f5f5;padding:4px 12px;border-radius:4px;font-size:.82rem;font-weight:500}
.pdp-back{display:inline-flex;align-items:center;gap:6px;color:#888;font-size:.9rem;text-decoration:none;margin-bottom:16px}
.pdp-back:hover{color:#E8831A}
</style>
</head>
<body>
<div id="announce-bar"></div>
<div id="site-header"></div>

<div class="pdp-container">
  <a href="/verkoop.html#rippa" class="pdp-back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Terug naar Rippa Minigravers</a>
  <div class="pdp-grid">
    <div class="pdp-gallery">
      <div class="pdp-main-img" id="mainImg"></div>
      <div class="pdp-thumbs" id="thumbs"></div>
    </div>
    <div class="pdp-info" id="productInfo">
      <p style="color:#888">Product wordt geladen...</p>
    </div>
  </div>
</div>

<div id="site-footer"></div>
<script src="/i18n.js"></script>
<script src="/components.js"></script>
<script src="/products.js"></script>
<script src="/winkel.js"></script>
<script>
(function(){
  var pid = "rippa-r13";
  var type = "rippa";
  var product = null;
  
  if (type === "loader") {
    product = MACHINES.find(function(m){ return m.id === pid; });
  } else if (type === "grasmaaier") {
    product = typeof GRASMAAIERS !== "undefined" ? GRASMAAIERS.find(function(g){ return g.id === pid; }) : null;
  } else if (type === "rippa") {
    product = typeof RIPPA !== "undefined" ? RIPPA.find(function(r){ return r.id === pid; }) : null;
  }
  
  if (!product) {
    document.getElementById("productInfo").innerHTML = "<p>Product niet gevonden.</p>";
    return;
  }
  
  // Set page title
  var name = product.name || product.model || pid;
  document.title = name + " | The IronCub Company";
  
  // Main image
  var img = product.img || "";
  if (img && !img.startsWith("http") && !img.startsWith("/")) img = "../" + img;
  document.getElementById("mainImg").innerHTML = img ? '<img src="' + img + '" alt="' + name + '">' : '';
  
  // Gallery thumbs (check if gallery folder exists)
  var galleryDir = "../assets/" + (type === "rippa" ? "rippa-" + pid.replace("rippa-","") : pid) + "-gallery/";
  // We'll skip gallery for now since we can't dynamically list files
  
  // Build product info
  var fmtPrice = function(v) { return new Intl.NumberFormat("nl-NL",{style:"currency",currency:"EUR",minimumFractionDigits:0,maximumFractionDigits:0}).format(v); };
  
  var html = "";
  html += "<h1>" + name + "</h1>";
  html += '<p class="pdp-subtitle">' + (product.subtitle || "") + "</p>";
  
  // Price
  if (product.poa) {
    html += '<p class="pdp-price">Prijs op aanvraag</p>';
  } else {
    var price = product.price || 0;
    var orig = product.originalPrice || 0;
    html += '<p class="pdp-price">';
    if (orig) html += '<span class="pdp-price-old">' + fmtPrice(orig) + '</span> ';
    html += fmtPrice(price) + ' <span class="pdp-btw">ex BTW</span></p>';
  }
  
  // Specs table
  html += '<div class="pdp-specs"><table>';
  if (type === "loader") {
    if (product.engine) html += "<tr><td>Motor</td><td>" + product.engine + "</td></tr>";
    if (product.powerKw) html += "<tr><td>Vermogen</td><td>" + product.powerKw + " kW</td></tr>";
    if (product.speedKmh) html += "<tr><td>Max. snelheid</td><td>" + product.speedKmh + " km/h</td></tr>";
    if (product.maxLoadKg) html += "<tr><td>Max. laadvermogen</td><td>" + product.maxLoadKg + " kg</td></tr>";
    if (product.widthMm) html += "<tr><td>Breedte</td><td>" + product.widthMm + " mm</td></tr>";
    if (product.fuel) html += "<tr><td>Brandstof</td><td>" + product.fuel + "</td></tr>";
    if (product.steering) html += "<tr><td>Besturing</td><td>" + product.steering + "</td></tr>";
  } else if (type === "grasmaaier") {
    if (product.engine_cc) html += "<tr><td>Motor</td><td>" + product.engine_cc + "cc &mdash; " + product.hp + " HP</td></tr>";
    if (product.mowing_width_cm) html += "<tr><td>Maaibreedte</td><td>" + product.mowing_width_cm + " cm</td></tr>";
    if (product.drive) html += "<tr><td>Aandrijving</td><td>" + product.drive + "</td></tr>";
    if (product.climb_angle) html += "<tr><td>Klimbereik</td><td>" + product.climb_angle + "&deg;</td></tr>";
    if (product.start) html += "<tr><td>Start</td><td>" + product.start + "</td></tr>";
  } else if (type === "rippa") {
    if (product.engine) html += "<tr><td>Motor</td><td>" + product.engine + "</td></tr>";
    if (product.power_kw) html += "<tr><td>Vermogen</td><td>" + product.power_kw + " kW / " + product.power_hp + " hp</td></tr>";
    if (product.weight_ton) html += "<tr><td>Gewicht</td><td>" + product.weight_ton + "</td></tr>";
    if (product.dig_depth_mm) html += "<tr><td>Graafdiepte</td><td>" + (product.dig_depth_mm/1000).toFixed(1) + " m</td></tr>";
    if (product.max_reach_mm) html += "<tr><td>Bereik</td><td>" + (product.max_reach_mm/1000).toFixed(1) + " m</td></tr>";
    if (product.bucket_m3) html += "<tr><td>Bak</td><td>" + product.bucket_m3 + " m&sup3;</td></tr>";
    if (product.width_mm) html += "<tr><td>Breedte</td><td>" + product.width_mm + " mm</td></tr>";
  }
  html += "</table></div>";
  
  // Description
  if (product.desc) {
    html += '<p class="pdp-desc">' + product.desc + "</p>";
  }
  
  // Tags
  if (product.specs && Array.isArray(product.specs)) {
    html += '<div class="pdp-tags">';
    product.specs.forEach(function(s){ html += '<span class="pdp-tag">' + s + "</span>"; });
    html += "</div>";
  }
  
  // Action buttons
  html += '<div class="pdp-actions">';
  html += '<a href="/checkout.html?product=' + pid + '" class="btn btn-cta">Kopen</a>';
  html += '<a href="/lease.html" class="btn btn-outline-dark">Leasen</a>';
  if (type === "loader") {
    html += '<a href="/afspraak.html" class="btn btn-outline-dark">Huren</a>';
    html += '<a href="/demodagen.html" class="btn btn-outline-dark">Demo</a>';
  }
  html += '<a href="/afspraak.html?onderwerp=' + encodeURIComponent(name) + '" class="btn btn-outline-dark">Meer info</a>';
  html += "</div>";
  
  document.getElementById("productInfo").innerHTML = html;
})();
</script>
</body>
</html>
